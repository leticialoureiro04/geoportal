<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>GeoPortal</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <link rel="icon" href="assets/logo-geoportal.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css?v=logo-ui">
</head>
<body>

    <header id="topbar">
        <div class="brand">
            <img class="brand-logo" src="assets/logo-geoportal.svg" alt="GeoPortal">
            <div>
                <strong>GeoPortal</strong>
                <span>Gestor de dados geograficos</span>
            </div>
        </div>
    </header>

    <main id="app-layout">
        <aside id="sidebar">
            <h2>GeoPortal</h2>

            <section class="sidebar-section">
                <h3>Criar Tema</h3>

                <form id="theme-form">
                    <label>Nome do tema:</label>
                    <input type="text" id="theme-name" required>

                    <label>Tipo de geometria:</label>
                    <select id="theme-geometry">
                        <option value="Point">Ponto</option>
                        <option value="LineString">Linha</option>
                        <option value="Polygon">Poligono</option>
                    </select>

                    <label>Cor:</label>
                    <input type="color" id="theme-color" value="#008000">

                    <button type="submit">Guardar Tema</button>
                </form>
            </section>

            <section class="sidebar-section">
                <h3>Criar Elemento</h3>

                <form id="feature-form">
                    <label>Tema:</label>
                    <select id="feature-theme" required></select>

                    <label>Nome:</label>
                    <input type="text"
                           id="feature-name"
                           placeholder="Preenchido automaticamente se ficar vazio">

                    <label>Descri&ccedil;&atilde;o:</label>
                    <input type="text"
                           id="feature-description"
                           placeholder="Opcional">

                    <p id="selected-coordinates">
                        Clique no mapa para escolher a localiza&ccedil;&atilde;o.
                    </p>

                    <div class="button-row">
                        <button type="button" id="clear-geometry">Limpar Desenho</button>
                        <button type="submit">Guardar Elemento</button>
                    </div>
                </form>
            </section>

            <section class="sidebar-section">
                <h3>Consulta Espacial</h3>

                <label class="query-toggle">
                    <input type="checkbox" id="query-mode">
                    Ativar consulta por raio
                </label>

                <label>Raio (metros):</label>
                <input type="number" id="query-radius" value="500" min="1">

                <p id="query-status">
                    Ative a consulta e clique no mapa.
                </p>

                <ul id="query-results"></ul>
            </section>

            <section class="sidebar-section">
                <h3>Temas</h3>
                <ul id="theme-list"></ul>
            </section>
        </aside>

        <section id="map-panel">
            <div id="map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js?v=mixed-geometries"></script>

</body>
</html>
